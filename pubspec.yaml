name: blevvision
description: "BlevVision Flutter App Scaffold"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  firebase_remote_config: ^5.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  dio: ^5.7.0
  go_router: ^14.2.0
  cached_network_image: ^3.4.0
  intl: ^0.20.2
  cloud_firestore: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/onboarding/organize.png
    - assets/onboarding/agenda.png
    - assets/onboarding/progresso.png
    - assets/icons/google.png
